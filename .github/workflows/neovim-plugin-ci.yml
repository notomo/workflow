name: Neovim plugin CI
on:
  workflow_call:
    inputs:
      test_os:
        description: "`runs-on` on test job"
        required: false
        default: '["ubuntu-latest", "macos-latest", "windows-latest"]'
        type: string
  workflow_dispatch:
  push:
    paths:
      - Makefile
      - .github/workflows/neovim-plugin-ci.yml

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(inputs.test_os || '["ubuntu-latest", "macos-latest", "windows-latest"]') }}
    steps:
      - uses: actions/checkout@v3
      - uses: notomo/action-setup-nvim-lua@v1

      - run: luarocks config
      - run: python --version

      - id: luarocks
        run: |
          import platform
          import subprocess

          enabled_shell = platform.system() == "Windows"

          home_tree_result = subprocess.run(
              ["luarocks", "config", "home_tree"], stdout=subprocess.PIPE, shell=enabled_shell
          )
          home_tree = home_tree_result.stdout.decode("utf-8")
          print(f"::set-output name=home_tree::{home_tree}")

          rocks_dir_result = subprocess.run(
              ["luarocks", "config", "rocks_dir"], stdout=subprocess.PIPE, shell=enabled_shell
          )
          rocks_dir = rocks_dir_result.stdout.decode("utf-8")
          print(f"::set-output name=rocks_dir::{rocks_dir}")

          major_version_result = subprocess.run(
              ["luarocks", "config", "major_version"],
              stdout=subprocess.PIPE,
              shell=enabled_shell,
          )
          major_version = major_version_result.stdout.decode("utf-8")
          print(f"::set-output name=major_version::{major_version}")
        shell: python

      - uses: actions/cache@v3
        with:
          path: |
            ${{ steps.luarocks.outputs.rocks_dir }}
            ${{ steps.luarocks.outputs.home_tree }}
          key: ${{ runner.os }}-luarocks-dirs-${{ steps.luarocks.outputs.major_version }}

      - run: luarocks install vusted

      - uses: rhysd/action-setup-vim@v1
        id: vim
        with:
          neovim: true
          version: nightly

      - run: make test
        env:
          VUSTED_NVIM: ${{ steps.vim.outputs.executable }}
