name: Neovim plugin CI
on:
  workflow_call:
    inputs:
      test_os:
        description: "`runs-on` on test job"
        required: false
        default: '["ubuntu-latest", "macos-latest", "windows-latest"]'
        type: string
  workflow_dispatch:
  push:
    paths:
      - Makefile
      - .github/workflows/neovim-plugin-ci.yml

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(inputs.test_os || '["ubuntu-latest", "macos-latest", "windows-latest"]') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: rhysd/action-setup-vim@febef33995d6649302e9d88dda81e071b68f16a7 # v1.6.1
        id: vim
        with:
          neovim: true
          version: nightly

      - run: make test
