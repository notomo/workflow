name: Neovim plugin CI
on:
  workflow_call:
    inputs:
      test_os:
        description: "`runs-on` on test job"
        required: false
        default: '["ubuntu-latest", "macos-latest", "windows-latest"]'
        type: string
  workflow_dispatch:
  push:
    paths:
      - Makefile
      - .github/workflows/neovim-plugin-ci.yml

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(inputs.test_os || '["ubuntu-latest", "macos-latest", "windows-latest"]') }}
    steps:
      - uses: actions/checkout@v3
      - uses: notomo/action-setup-nvim-lua@v1

      - id: luarocks
        run: |
          version=$(luarocks config program_version)
          local_cache=$(luarocks config local_cache)
          echo "::set-output name=version::$(echo ${version})"
          echo "::set-output name=local_cache::$(echo ${local_cache})"
        shell: bash

      - uses: actions/cache@v3
        with:
          path: ${{ steps.luarocks.outputs.local_cache }}
          key: ${{ runner.os }}-luarocks-${{ steps.luarocks.outputs.version }}

      - run: luarocks install vusted

      - uses: rhysd/action-setup-vim@v1
        id: vim
        with:
          neovim: true
          version: nightly

      - run: make test
        env:
          VUSTED_NVIM: ${{ steps.vim.outputs.executable }}
